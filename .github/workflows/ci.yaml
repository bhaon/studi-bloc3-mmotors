---
# ============================================================
# WORKFLOW CI — Réutilisable (callable workflow)
# Appelé par deploy-dev.yaml, deploy-staging.yaml, deploy-prod.yaml
# via : uses: ./.github/workflows/ci.yaml
# ============================================================
name: CI — Build, Test & Scan
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # pour éviter les erreurs de compatibilité avec Node.js 24

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Environnement cible : dev | staging | production"
      image_tag:
        required: true
        type: string
        description: "Tag Docker à construire et pousser"
      run_integration_tests:
        required: false
        type: boolean
        default: false
        description: "Lancer les tests d'intégration"
    outputs:
      frontend_image:
        description: "Image frontend complète avec tag"
        value: ${{ jobs.build.outputs.frontend_image }}
      backend_image:
        description: "Image backend complète avec tag"
        value: ${{ jobs.build.outputs.backend_image }}
    secrets:
      GHCR_TOKEN:
        required: true

jobs:
  # ────────────────────────────────────────────────────────────
  # JOB 1 : Tests unitaires et lint
  # ────────────────────────────────────────────────────────────
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Frontend ──────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Type check frontend
        working-directory: frontend
        run: npm run type-check
        continue-on-error: ${{ inputs.environment == 'dev' }}

      - name: Test frontend
        working-directory: frontend
        run: npm run test -- --coverage --passWithNoTests --ci
        env:
          CI: true

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage-${{ inputs.image_tag }}
          path: frontend/coverage/
          retention-days: 7

      # ── Backend ───────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements*.txt

      - name: Install backend deps
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint backend (ruff)
        working-directory: backend
        run: |
          pip install ruff
          ruff check . --output-format=github

      - name: Type check backend (mypy)
        working-directory: backend
        run: |
          pip install mypy
          mypy . --ignore-missing-imports
        continue-on-error: ${{ inputs.environment == 'dev' }}

      - name: Test backend
        working-directory: backend
        run: |
          pytest \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short \
            -q
        env:
          DATABASE_URL: "postgresql://testuser:testpass@localhost:5432/testdb"
          SECRET_KEY: "test-secret-key-only-for-ci"
          ENVIRONMENT: "test"

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-${{ inputs.image_tag }}
          path: backend/coverage.xml
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # JOB 2 : Build Docker + Push GHCR + Scan Trivy
  # ────────────────────────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
      security-events: write
    outputs:
      frontend_image: ghcr.io/${{ github.repository }}-frontend:${{ inputs.image_tag }}
      backend_image: ghcr.io/${{ github.repository }}-backend:${{ inputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:master
            network=host

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # ── Frontend ──────────────────────────────────────────
      - name: Build & Push frontend
        id: build-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-frontend:${{ inputs.image_tag }}
            ghcr.io/${{ github.repository }}-frontend:${{ inputs.environment }}-latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.run_started_at }}
            com.myapp.environment=${{ inputs.environment }}
          cache-from: type=gha,scope=frontend-${{ inputs.environment }}
          cache-to: type=gha,mode=max,scope=frontend-${{ inputs.environment }}
          build-args: |
            BUILD_ENV=${{ inputs.environment }}
            NEXT_PUBLIC_API_URL=${{ inputs.environment == 'production' && 'https://netdevops.fr/api' || format('https://{0}.netdevops.fr/api', inputs.environment) }}
          provenance: false

      # ── Backend ───────────────────────────────────────────
      - name: Build & Push backend
        id: build-backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-backend:${{ inputs.image_tag }}
            ghcr.io/${{ github.repository }}-backend:${{ inputs.environment }}-latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.run_started_at }}
            com.myapp.environment=${{ inputs.environment }}
          cache-from: type=gha,scope=backend-${{ inputs.environment }}
          cache-to: type=gha,mode=max,scope=backend-${{ inputs.environment }}
          provenance: false

      # ── Scan Trivy — Frontend ─────────────────────────────
      - name: Scan frontend (Trivy)
        id: trivy-frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}-frontend:${{ inputs.image_tag }}
          format: "sarif"
          output: "trivy-frontend.sarif"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          exit-code: ${{ inputs.environment == 'production' && '1' || '0' }}

      - name: Upload Trivy frontend → GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-frontend.sarif"
          category: "trivy-frontend"

      # ── Scan Trivy — Backend ──────────────────────────────
      - name: Scan backend (Trivy)
        id: trivy-backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}-backend:${{ inputs.image_tag }}
          format: "sarif"
          output: "trivy-backend.sarif"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          exit-code: ${{ inputs.environment == 'production' && '1' || '0' }}

      - name: Upload Trivy backend → GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-backend.sarif"
          category: "trivy-backend"

      # ── Scan SBOM (Software Bill of Materials) ────────────
      - name: Generate SBOM — backend
        uses: aquasecurity/trivy-action@master
        if: ${{ inputs.environment == 'production' }}
        with:
          image-ref: ghcr.io/${{ github.repository }}-backend:${{ inputs.image_tag }}
          format: "cyclonedx"
          output: "sbom-backend.json"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        if: ${{ inputs.environment == 'production' }}
        with:
          name: sbom-${{ inputs.image_tag }}
          path: sbom-backend.json
          retention-days: 90

  # ────────────────────────────────────────────────────────────
  # JOB 3 : Tests d'intégration (optionnel, staging uniquement)
  # ────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    if: ${{ inputs.run_integration_tests }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: integrationdb
          POSTGRES_USER: intuser
          POSTGRES_PASSWORD: intpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Run backend integration tests
        run: |
          docker run --rm \
            --network host \
            -e DATABASE_URL="postgresql://intuser:intpass@localhost:5432/integrationdb" \
            -e ENVIRONMENT="test" \
            -e SECRET_KEY="integration-test-key" \
            ghcr.io/${{ github.repository }}-backend:${{ inputs.image_tag }} \
            pytest tests/integration/ -v --tb=short
