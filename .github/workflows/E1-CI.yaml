# ============================================================================
# M-Motors — GitHub Actions CI/CD Pipeline
# ----------------------------------------------------------------------------
# Stack    : Next.js (frontend) · FastAPI/Python (backend) · PostgreSQL · Redis
# Tests    : Pytest · Jest · Playwright · SonarQube (SAST)
# ============================================================================

name: M-Motors CI/CD

# ── Déclencheurs ─────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environnement cible"
        required: true
        default: "staging"
        type: choice
        options: [staging, production, E1-US_01-05-Issues]
      skip_tests:
        description: "Passer les tests (urgence uniquement)"
        required: false
        default: false
        type: boolean

# ── Variables globales ────────────────────────────────────────────────────────
env:
  # SonarCloud: préférer des Variables de dépôt pour éviter les écarts push/manual.
  SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY || 'mmotors' }}
  SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION || github.repository_owner }}
  NODE_VERSION:   "22"
  PYTHON_VERSION: "3.12"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ── Annulation des runs redondants ───────────────────────────────────────────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# =============================================================================
# JOBS
# =============================================================================
jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1 — DÉTECTION DES CHANGEMENTS
  # ──────────────────────────────────────────────────────────────────────────
  changes:
    name: "🔍 Détection des changements"
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend:  ${{ steps.filter.outputs.backend }}
      compose:  ${{ steps.filter.outputs.compose }}
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
              - 'requirements*.txt'
              - 'alembic/**'
            compose:
              - 'docker-compose*.yml'
              - '.env.example'
              - '.github/workflows/**'

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2 — LINT FRONTEND (ESLint + TypeScript + Prettier)
  # ──────────────────────────────────────────────────────────────────────────
  lint-frontend:
    name: "🧹 Lint Frontend"
    runs-on: ubuntu-latest
    needs: changes
    if: |
      (needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch') &&
      !inputs.skip_tests
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances
        run: npm ci --prefer-offline
        working-directory: frontend

      - name: TypeScript strict (tsc --noEmit)
        run: npm run type-check

      - name: ESLint
        run: npm run lint

      - name: Prettier — vérification formatage
        run: npm run format:check

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3 — LINT BACKEND (Ruff + Mypy + Bandit)
  # ──────────────────────────────────────────────────────────────────────────
  lint-backend:
    name: "🧹 Lint Backend"
    runs-on: ubuntu-latest
    needs: changes
    if: |
      (needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch') &&
      !inputs.skip_tests
    env:
      # Obligatoires pour charger app.core.config (mypy importe le paquet app)
      DATABASE_URL: sqlite:///./lint-mypy.db
      SECRET_KEY: mmotors-ci-lint-only-secret-not-for-production-min-32ch
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements*.txt

      - name: Installer les dépendances
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff — lint + format check
        run: |
          ruff check . --output-format=github
          ruff format --check .

      - name: Mypy — vérification de types
        run: mypy -p app --ignore-missing-imports --explicit-package-bases

      - name: Bandit — analyse sécurité SAST
        run: bandit -r app/ -f json -o bandit-report.json
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: backend/bandit-report.json
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 4 — TESTS UNITAIRES BACKEND (Pytest — SQLite in-memory)
  # ──────────────────────────────────────────────────────────────────────────
  test-backend-unit:
    name: "🧪 Tests unitaires Backend"
    runs-on: ubuntu-latest
    needs: lint-backend
    if: ${{ !inputs.skip_tests }}
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements*.txt

      - name: Installer les dépendances
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Pytest — tests unitaires (couverture >= 80%)
        run: |
          pytest tests/unit/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            --junitxml=pytest-unit-results.xml \
            -v
        env:
          ENV: test
          SECRET_KEY: mmotors-ci-test-secret-do-not-use-in-production-min-32chars
          DATABASE_URL: sqlite:///./test.db

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-unit-results
          path: |
            backend/pytest-unit-results.xml
            backend/coverage.xml
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 5 — TESTS D'INTÉGRATION BACKEND (Pytest + PostgreSQL + Redis)
  # ──────────────────────────────────────────────────────────────────────────
  test-backend-integration:
    name: "🔗 Tests intégration Backend"
    runs-on: ubuntu-latest
    needs: lint-backend
    if: ${{ !inputs.skip_tests }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     mmotors
          POSTGRES_PASSWORD: mmotors_test
          POSTGRES_DB:       mmotors_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements*.txt

      - name: Installer les dépendances
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Migrations Alembic
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql://mmotors:mmotors_test@localhost:5432/mmotors_test
          SECRET_KEY: mmotors-ci-test-secret-do-not-use-in-production-min-32chars

      - name: Pytest — tests d'intégration
        run: |
          pytest tests/integration/ \
            --junitxml=pytest-integration-results.xml \
            -v --timeout=60
        env:
          ENV: test
          SECRET_KEY: mmotors-ci-test-secret-do-not-use-in-production-min-32chars
          DATABASE_URL: postgresql://mmotors:mmotors_test@localhost:5432/mmotors_test
          REDIS_URL: redis://localhost:6379/0

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-integration-results
          path: backend/pytest-integration-results.xml
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 6 — TESTS UNITAIRES FRONTEND (Jest)
  # ──────────────────────────────────────────────────────────────────────────
  test-frontend-unit:
    name: "🧪 Tests unitaires Frontend"
    runs-on: ubuntu-latest
    needs: lint-frontend
    if: ${{ !inputs.skip_tests }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances
        run: npm ci --prefer-offline

      - name: Jest — tests unitaires + couverture
        run: npm run test:ci
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 7 — BUILD FRONTEND (next build)
  # ──────────────────────────────────────────────────────────────────────────

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 8 — ANALYSE SONARQUBE (SAST)
  # ──────────────────────────────────────────────────────────────────────────
  sonarqube:
    name: "🔐 Analyse SonarQube"
    runs-on: ubuntu-latest
    needs: [test-backend-unit, test-frontend-unit, test-backend-integration]
    if: always() && !cancelled()

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # requis pour l'analyse d'historique SonarQube

      - uses: actions/download-artifact@v4
        with:
          name: pytest-unit-results
          path: backend/
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
        continue-on-error: true

      - name: Vérifier la config SonarCloud
        id: sonar-config
        run: |
          if [[ -z "${{ secrets.SONAR_TOKEN }}" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SONAR_TOKEN absent: analyse Sonar ignorée pour ce run."
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - uses: SonarSource/sonarcloud-github-action@master
        if: steps.sonar-config.outputs.enabled == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.sources=frontend/src,backend/app
            -Dsonar.python.coverage.reportPaths=backend/coverage.xml
            -Dsonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
            -Dsonar.qualitygate.wait=true

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 9 — BUILD & PUSH IMAGES DOCKER vers GHCR
  # ──────────────────────────────────────────────────────────────────────────

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 10 — SCAN TRIVY (images GHCR)
  # ──────────────────────────────────────────────────────────────────────────

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 11 — DEPLOIEMENT STAGING (branche develop)
  # SSH vers serveur local — docker compose up
  # ──────────────────────────────────────────────────────────────────────────
      
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 12 — TESTS E2E PLAYWRIGHT (sur staging)
  # ──────────────────────────────────────────────────────────────────────────

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 13 — DEPLOIEMENT PRODUCTION (branche main)
  # Approbation manuelle via GitHub Environment protection rules
  # ──────────────────────────────────────────────────────────────────────────

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 14 — NOTIFICATION SLACK
  # ──────────────────────────────────────────────────────────────────────────
  notify:
    name: "📣 Notification Slack"
    runs-on: ubuntu-latest
    # Déploiements SSH commentés : on rattache la notif fin de pipeline à Trivy.
    needs: [sonarqube]
    if: always()

    steps:
      - name: Determiner le statut global
        id: status
        run: |
          RESULTS="${{ needs.sonarqube.result }}"
          if echo "$RESULTS" | grep -q "failure"; then
            echo "emoji=🔴" >> $GITHUB_OUTPUT
            echo "env=Echec pipeline" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
          else
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "env=CI + SonarQube OK" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          fi

      - name: Notification Slack
        uses: slackapi/slack-github-action@v2
        if: always()
        with:
          webhook:      ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ steps.status.outputs.emoji }} *M-Motors* — ${{ steps.status.outputs.env }}",
              "attachments": [{
                "color": "${{ steps.status.outputs.color }}",
                "fields": [
                  {"title": "Branche", "value": "${{ github.ref_name }}",  "short": true},
                  {"title": "Auteur",  "value": "${{ github.actor }}",     "short": true},
                  {"title": "Commit",  "value": "${{ github.sha }}",       "short": true},
                  {"title": "Logs",    "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Voir le run>", "short": true}
                ]
              }]
            }