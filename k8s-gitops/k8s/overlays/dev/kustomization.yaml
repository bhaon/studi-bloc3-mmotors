---
# ============================================================
# OVERLAY DEV — Kustomization
# Déployé automatiquement à chaque push sur la branche develop
# ============================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev

bases:
  - ../../base

resources:
  - namespace.yaml
  - resource-quota.yaml
  - ingress.yaml
  - configmap.yaml

patchesStrategicMerge:
  - patches/replicas.yaml
  - patches/resources.yaml
  - patches/storage.yaml

images:
  - name: ghcr.io/bhaon/mmotors-frontend
    newTag: dev-latest  # Remplacé dynamiquement par GitHub Actions
  - name: ghcr.io/bhaon/mmotors-backend
    newTag: dev-latest
    
commonLabels:
  environment: dev

commonAnnotations:
  managed-by: kustomize
  environment: dev
