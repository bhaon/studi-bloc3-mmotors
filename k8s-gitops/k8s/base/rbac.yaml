---
# ============================================================
# SERVICE ACCOUNT — Application pods
# Principe du moindre privilège : aucun accès à l'API K8s
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-service-account
  labels:
    app: myapp
automountServiceAccountToken: false  # Désactivé : les pods n'ont pas besoin de l'API K8s
---
# ============================================================
# SERVICE ACCOUNT — CI/CD GitHub Actions (par namespace)
# Créé une fois manuellement, kubeconfig extrait et stocké
# dans GitHub Secrets
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-actions-deployer
  labels:
    managed-by: ci-cd
---
# ============================================================
# ROLE — Droits minimaux pour le deployer CI/CD
# Uniquement : get/list/patch sur deployments + rollout
# ============================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deployer-role
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services", "configmaps"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
# ============================================================
# ROLEBINDING — Association role ↔ service account CI
# ============================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: deployer-rolebinding
subjects:
  - kind: ServiceAccount
    name: github-actions-deployer
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: deployer-role
