---
# ============================================================
# SERVICE — Frontend (ClusterIP, exposé via Ingress)
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
---
# ============================================================
# SERVICE — Backend API (ClusterIP, interne uniquement)
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
---
# ============================================================
# SERVICE — PostgreSQL (ClusterIP, interne uniquement)
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  labels:
    app: postgresql
spec:
  type: ClusterIP
  selector:
    app: postgresql
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
