# Overlay optionnel : construire frontend + backend depuis les sources (développement local).
# Sans ce fichier, les sections image des services doivent déjà exister (pull ou tag local).
#
# Usage :
#   docker compose -f docker-compose.yml -f docker-compose.build.yml build frontend backend nginx
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

  nginx:
    build:
      context: ./deploy/nginx
      dockerfile: Dockerfile
