apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
stringData:
  SECRET_KEY: "CHANGE_ME_PRODUCTION_SECRET_KEY_AT_LEAST_32_CHARS"
---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
type: Opaque
stringData:
  POSTGRES_DB: "mmotors"
  POSTGRES_USER: "mmotors"
  POSTGRES_PASSWORD: "mmotors"
  DATABASE_URL: "postgresql://mmotors:mmotors@postgresql:5432/mmotors"
