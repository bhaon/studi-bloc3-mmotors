---
# ============================================================
# SECRETS — DEV (valeurs placeholder)
# À adapter avant usage en environnement réel.
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
stringData:
  # Doit être fourni au backend (JWT). Mettre une valeur >= 32 caractères.
  SECRET_KEY: "CHANGE_ME_DEV_SECRET_KEY_AT_LEAST_32_CHARS"
---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
type: Opaque
stringData:
  POSTGRES_DB: "mmotors"
  POSTGRES_USER: "mmotors"
  POSTGRES_PASSWORD: "mmotors"
  # Utilisé par le backend + initContainer db-migrate
  DATABASE_URL: "postgresql://mmotors:mmotors@postgresql:5432/mmotors"
