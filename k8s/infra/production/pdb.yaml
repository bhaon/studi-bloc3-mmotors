---
# ============================================================
# POD DISRUPTION BUDGET — Garantit la disponibilité
# en cas de maintenance du nœud (drain, upgrade K3S)
# ============================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: production
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: frontend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: production
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: backend
